version: "3.9"

services:
  mcp-proxy:
    build:
      context: .
      dockerfile: apps/agency-marketing-os/mcp-proxy/Dockerfile
    environment:
      MCP_PROXY_HOST: 0.0.0.0
      MCP_PROXY_PORT: 4000
      MCP_PROXY_MODE: ${MCP_PROXY_MODE:-mock}
      MCP_PROXY_TOKEN: ${MCP_PROXY_TOKEN:-local-dev-token}
      MCP_PROXY_TIMEOUT_MS: ${MCP_PROXY_TIMEOUT_MS:-15000}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_SERVICE_ACCOUNT_FILE: ${GOOGLE_SERVICE_ACCOUNT_FILE:-}
      GA4_PROPERTY_ID: ${GA4_PROPERTY_ID:-}
      GSC_SITE_URL: ${GSC_SITE_URL:-}
      GOOGLE_ADS_API_VERSION: ${GOOGLE_ADS_API_VERSION:-v18}
      GOOGLE_ADS_DEVELOPER_TOKEN: ${GOOGLE_ADS_DEVELOPER_TOKEN:-}
      GOOGLE_ADS_CUSTOMER_ID: ${GOOGLE_ADS_CUSTOMER_ID:-}
      GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${GOOGLE_ADS_LOGIN_CUSTOMER_ID:-}
      GOOGLE_ADS_CLIENT_ID: ${GOOGLE_ADS_CLIENT_ID:-}
      GOOGLE_ADS_CLIENT_SECRET: ${GOOGLE_ADS_CLIENT_SECRET:-}
      GOOGLE_ADS_REFRESH_TOKEN: ${GOOGLE_ADS_REFRESH_TOKEN:-}
      META_GRAPH_VERSION: ${META_GRAPH_VERSION:-v21.0}
      META_AD_ACCOUNT_ID: ${META_AD_ACCOUNT_ID:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      TOOL_GA4_WEBHOOK_URL: ${TOOL_GA4_WEBHOOK_URL:-}
      TOOL_GOOGLE_ADS_WEBHOOK_URL: ${TOOL_GOOGLE_ADS_WEBHOOK_URL:-}
      TOOL_META_ADS_WEBHOOK_URL: ${TOOL_META_ADS_WEBHOOK_URL:-}
      TOOL_GOOGLE_SEARCH_CONSOLE_WEBHOOK_URL: ${TOOL_GOOGLE_SEARCH_CONSOLE_WEBHOOK_URL:-}
      TOOL_SEMRUSH_WEBHOOK_URL: ${TOOL_SEMRUSH_WEBHOOK_URL:-}
      TOOL_AHREFS_WEBHOOK_URL: ${TOOL_AHREFS_WEBHOOK_URL:-}
    ports:
      - "4000:4000"

  agency-os:
    build:
      context: .
      dockerfile: apps/agency-marketing-os/Dockerfile
    depends_on:
      - mcp-proxy
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      MCP_PROXY_URL: http://mcp-proxy:4000
      MCP_PROXY_TOKEN: ${MCP_PROXY_TOKEN:-local-dev-token}
    ports:
      - "8787:8787"
